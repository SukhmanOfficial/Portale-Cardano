<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accesso negato — ITIS "G. Cardano"</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <style>
    body { background: var(--color-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: var(--font-sans); }
    .err { text-align: center; padding: 2rem; }
    .err__code { font-size: 8rem; font-weight: 900; color: var(--color-primary); line-height: 1; }
    .err__title { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 1rem 0 0.5rem; }
    .err__sub { color: rgba(255,255,255,0.5); margin-bottom: 2rem; }
    .err__btn { display: inline-block; background: var(--color-primary); color: #fff; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="err">
    <div class="err__code">403</div>
    <div class="err__title">Accesso negato</div>
    <div class="err__sub">Non hai i permessi per accedere a questa risorsa.</div>
    <a href="index.html" class="err__btn">← Torna alla home</a>
  </div>
</body>
</html>
