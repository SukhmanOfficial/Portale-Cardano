<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accesso Genitore — ITIS G. Cardano, Pavia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/logo.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-page">

  <!-- Logo -->
  <div class="auth-header">
    <div class="itis-logo itis-logo--lg itis-logo--on-dark">
      <img src="assets/logo.jpg" alt='Logo ITIS "G. Cardano" — Pavia' />
    </div>
    <div style="text-align:center">
      <div class="auth-header__name" data-config="istituto.nome_lungo"></div>
      <div class="auth-header__sub" data-config="ui.auth_sub"></div>
    </div>
  </div>

  <!-- Card form -->
  <div class="auth-card">

    <h1 class="auth-card__title">Bentornato</h1>
    <p class="auth-card__subtitle">Accedi per gestire le iscrizioni dei tuoi figli</p>

    <!-- Alert minori -->
    <div class="auth-alert-minori" role="note">
      <span aria-hidden="true">ℹ️</span>
      <span>I minorenni non possono iscriversi autonomamente. L'iscrizione deve essere effettuata da un genitore registrato.</span>
    </div>

    <!-- Alert errore -->
    <div id="login-alert" class="alert alert--error" role="alert" aria-live="polite" style="display:none"></div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="login-email">Indirizzo email</label>
        <input type="email" id="login-email" class="form-input"
          placeholder="mario.rossi@email.it" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="form-input-wrap">
          <input type="password" id="login-password" class="form-input"
            placeholder="••••••••" autocomplete="current-password" required />
          <span class="form-input-icon" data-toggle-pwd="login-password"
            role="button" tabindex="0" aria-label="Mostra/nascondi password">👁</span>
        </div>
      </div>

      <div class="form-check">
        <label class="form-check__left">
          <input type="checkbox" id="login-remember" />
          <span>Ricordami per 7 giorni</span>
        </label>
        <a href="reset-password.html" class="form-link">Password dimenticata?</a>
      </div>

      <button type="submit" id="login-submit" class="btn-submit">
        <span class="spinner" aria-hidden="true"></span>
        <span class="btn-text">ACCEDI AL SISTEMA</span>
      </button>

    </form>

    <div class="form-divider">oppure</div>

    <div class="form-footer">
      Non hai ancora un account?
      <a href="registrazione.html" class="form-link">Registrati qui</a>
    </div>

  </div>

  <div class="auth-back">
    <a href="index.html">← Torna alla home</a>
  </div>

</div>

<script src="js/api-client.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
